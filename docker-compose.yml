version: "3.9"
services:
  nginx:
    image: nginx:latest
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/ssl/
  main:
    build:
      context: ./main
    restart: unless-stopped
    volumes:
      - ./main/src:/app/src